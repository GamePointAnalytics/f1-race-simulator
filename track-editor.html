<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Track Editor v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 300px;
            background: #16213e;
            padding: 15px;
            overflow-y: auto;
            border-right: 1px solid #333;
        }
        .sidebar h1 { font-size: 1.1rem; margin-bottom: 10px; color: #e94560; }
        .track-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 15px; }
        .track-btn {
            background: #0f3460; border: none; color: #ddd; padding: 6px 10px;
            text-align: left; cursor: pointer; border-radius: 4px; font-size: 0.8rem;
        }
        .track-btn:hover { background: #1a508b; }
        .track-btn.active { background: #e94560; color: #fff; }
        .track-btn.done { border-left: 3px solid #0f0; }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .control-group label { display: block; font-size: 0.7rem; color: #999; margin-bottom: 2px; text-transform: uppercase; }
        .control-group .value { font-size: 0.75rem; color: #e94560; float: right; }
        .control-group input[type="range"] { width: 100%; }
        .checkbox-row { display: flex; gap: 12px; align-items: center; }
        .checkbox-row label { font-size: 0.8rem; cursor: pointer; }

        .actions { margin-top: 15px; display: flex; flex-direction: column; gap: 6px; }
        .action-btn {
            background: #e94560; border: none; color: #fff; padding: 8px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .action-btn:hover { background: #c73650; }
        .action-btn.secondary { background: #0f3460; }
        .action-btn.secondary:hover { background: #1a508b; }

        .info-box {
            margin-top: 10px; padding: 8px; background: #0a0a1a; 
            border: 1px solid #333; border-radius: 6px; font-size: 0.75rem;
            color: #aaa; line-height: 1.5;
        }
        .info-box .correct { color: #0f0; }
        .info-box .wrong { color: #e94560; }

        .main-area {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; position: relative;
        }
        .preview-container { background: #111; border: 2px solid #333; border-radius: 12px; position: relative; }
        .preview-container svg { display: block; }
        .track-name-overlay {
            position: absolute; top: 12px; left: 15px;
            font-size: 1.3rem; font-weight: bold; color: #e94560;
        }
        .direction-info {
            position: absolute; top: 12px; right: 15px;
            font-size: 0.85rem; color: #aaa;
        }
        .legend {
            position: absolute; bottom: 12px; left: 15px; font-size: 0.7rem; color: #666;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16213e; border: 1px solid #e94560; border-radius: 12px;
            padding: 20px; max-width: 900px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { color: #e94560; margin-bottom: 10px; }
        .modal textarea {
            width: 100%; height: 400px; background: #0a0a1a; color: #0f0;
            border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 0.75rem;
            border-radius: 6px; resize: vertical;
        }
        .modal .btn-row { margin-top: 10px; display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>🏎️ Track Direction Editor</h1>
    <div class="track-list" id="track-list"></div>

    <div class="controls">
        <div class="control-group">
            <label>Start Offset <span class="value" id="offset-val">0.00</span></label>
            <input type="range" id="startOffset" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="checkbox-row">
            <label><input type="checkbox" id="reversed"> Reverse Direction</label>
        </div>
        <div class="control-group">
            <label>Stroke Width <span class="value" id="stroke-val">8</span></label>
            <input type="range" id="strokeWidth" min="3" max="20" step="1" value="8">
        </div>
    </div>

    <div class="info-box" id="info-box">
        Select a track to see direction info.
    </div>

    <div class="actions">
        <button class="action-btn" id="btn-save">✅ Save This Track</button>
        <button class="action-btn secondary" id="btn-export">📋 Export circuits.js Changes</button>
    </div>
</div>

<div class="main-area">
    <div class="preview-container">
        <svg id="preview-svg" width="750" height="550" viewBox="0 0 1000 1000">
            <rect x="0" y="0" width="1000" height="1000" fill="#111" />
            <path id="preview-path" stroke="#444" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round" />
            <!-- Direction arrows along the track -->
            <g id="direction-arrows"></g>
            <!-- Start/Finish marker -->
            <circle id="start-marker" r="12" fill="#0f0" opacity="0.9" cx="0" cy="0" />
            <text id="start-label" fill="#0f0" font-size="14" font-weight="bold" x="0" y="0">S/F</text>
            <!-- Animated car dot -->
            <circle id="car-dot" r="8" fill="#e94560" cx="0" cy="0" />
        </svg>
        <div class="track-name-overlay" id="track-label">Select a track</div>
        <div class="direction-info" id="direction-info"></div>
        <div class="legend">
            🟢 = Start/Finish | 🔴 = Car (animated) | ➤ = Direction arrows
        </div>
    </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal">
    <div class="modal">
        <h2>Export Direction Data</h2>
        <textarea id="export-text" readonly></textarea>
        <div class="btn-row">
            <button class="action-btn" onclick="copyExport()">📋 Copy</button>
            <button class="action-btn secondary" onclick="document.getElementById('export-modal').classList.remove('active')">Close</button>
        </div>
    </div>
</div>

<script type="module">
    import { CIRCUITS } from './src/data/circuits.js';

    // Known correct racing directions
    const CORRECT_DIRECTIONS = {
        oz: { direction: 'clockwise', label: 'Australia (Melbourne)' },
        china: { direction: 'clockwise', label: 'China (Shanghai)' },
        suzuka: { direction: 'clockwise', label: 'Japan (Suzuka) - Figure 8' },
        bahrain: { direction: 'clockwise', label: 'Bahrain (Sakhir)' },
        jeddah: { direction: 'counter-clockwise', label: 'Saudi Arabia (Jeddah)' },
        miami: { direction: 'counter-clockwise', label: 'USA (Miami)' },
        imola: { direction: 'counter-clockwise', label: 'Italy (Imola)' },
        monaco: { direction: 'clockwise', label: 'Monaco' },
        barcelona: { direction: 'clockwise', label: 'Spain (Barcelona)' },
        canada: { direction: 'clockwise', label: 'Canada (Montreal)' },
        austria: { direction: 'clockwise', label: 'Austria (Red Bull Ring)' },
        silverstone: { direction: 'clockwise', label: 'Great Britain (Silverstone)' },
        spa: { direction: 'clockwise', label: 'Belgium (Spa)' },
        hungary: { direction: 'clockwise', label: 'Hungary (Hungaroring)' },
        zandvoort: { direction: 'clockwise', label: 'Netherlands (Zandvoort)' },
        monza: { direction: 'clockwise', label: 'Italy (Monza)' },
        baku: { direction: 'counter-clockwise', label: 'Azerbaijan (Baku)' },
        singapore: { direction: 'counter-clockwise', label: 'Singapore (Marina Bay)' },
        austin: { direction: 'counter-clockwise', label: 'USA (COTA)' },
        mexico: { direction: 'clockwise', label: 'Mexico (Mexico City)' },
        interlagos: { direction: 'counter-clockwise', label: 'Brazil (Interlagos)' },
        vegas: { direction: 'counter-clockwise', label: 'USA (Las Vegas)' },
        qatar: { direction: 'clockwise', label: 'Qatar (Lusail)' },
        abudhabi: { direction: 'clockwise', label: 'Abu Dhabi (Yas Marina)' },
        testing: { direction: 'clockwise', label: 'Testing (Barcelona)' },
    };

    const state = {
        tracks: {},
        currentId: null,
        animFrame: null,
        animProgress: 0,
    };

    // Initialize
    CIRCUITS.forEach(c => {
        state.tracks[c.id] = {
            name: c.name,
            path: c.path,
            startOffset: c.startOffset || 0,
            reversed: c.reversed || false,
            strokeWidth: 8,
        };
    });

    // Build sidebar
    const listEl = document.getElementById('track-list');
    CIRCUITS.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'track-btn';
        const dir = CORRECT_DIRECTIONS[c.id];
        const dirIcon = dir?.direction === 'counter-clockwise' ? '↺' : '↻';
        btn.textContent = `${dirIcon} ${c.name}`;
        btn.dataset.id = c.id;
        btn.addEventListener('click', () => selectTrack(c.id));
        listEl.appendChild(btn);
    });

    const offsetSlider = document.getElementById('startOffset');
    const reversedCheck = document.getElementById('reversed');
    const strokeSlider = document.getElementById('strokeWidth');
    const pathEl = document.getElementById('preview-path');
    const svgEl = document.getElementById('preview-svg');
    const startMarker = document.getElementById('start-marker');
    const startLabel = document.getElementById('start-label');
    const carDot = document.getElementById('car-dot');
    const arrowsGroup = document.getElementById('direction-arrows');

    function selectTrack(id) {
        state.currentId = id;
        const t = state.tracks[id];

        document.querySelectorAll('.track-btn').forEach(b => 
            b.classList.toggle('active', b.dataset.id === id));

        offsetSlider.value = t.startOffset;
        reversedCheck.checked = t.reversed;
        strokeSlider.value = t.strokeWidth;

        document.getElementById('track-label').textContent = t.name;
        
        const dir = CORRECT_DIRECTIONS[id];
        document.getElementById('direction-info').textContent = 
            dir ? `Should be: ${dir.direction}` : '';

        // Update info box
        const infoBox = document.getElementById('info-box');
        infoBox.innerHTML = `<b>${t.name}</b><br>` +
            `Direction: ${dir?.direction || 'unknown'}<br>` +
            `Start Offset: ${t.startOffset.toFixed(2)}<br>` +
            `Reversed: ${t.reversed}`;

        renderPreview();
        startAnimation();
    }

    function renderPreview() {
        if (!state.currentId) return;
        const t = state.tracks[state.currentId];

        document.getElementById('offset-val').textContent = t.startOffset.toFixed(2);
        document.getElementById('stroke-val').textContent = t.strokeWidth;

        pathEl.setAttribute('d', t.path);
        pathEl.setAttribute('stroke-width', t.strokeWidth);

        // Auto-fit viewBox
        try {
            const bbox = pathEl.getBBox();
            const pad = 50;
            svgEl.setAttribute('viewBox',
                `${bbox.x - pad} ${bbox.y - pad} ${bbox.width + pad * 2} ${bbox.height + pad * 2}`);
        } catch(e) {}

        // Draw start/finish marker
        const len = pathEl.getTotalLength();
        const sfDist = t.startOffset * len;
        const sfPoint = pathEl.getPointAtLength(t.reversed ? (len - sfDist) : sfDist);
        startMarker.setAttribute('cx', sfPoint.x);
        startMarker.setAttribute('cy', sfPoint.y);
        startLabel.setAttribute('x', sfPoint.x + 15);
        startLabel.setAttribute('y', sfPoint.y + 5);

        // Draw direction arrows along the path
        arrowsGroup.innerHTML = '';
        const numArrows = 12;
        for (let i = 0; i < numArrows; i++) {
            const frac = (i + 0.5) / numArrows;
            const adjustedFrac = (t.startOffset + frac) % 1;
            const d1 = t.reversed 
                ? len * (1 - adjustedFrac) 
                : len * adjustedFrac;
            const d2 = t.reversed 
                ? len * (1 - adjustedFrac) - len * 0.005
                : len * adjustedFrac + len * 0.005;
            
            const p1 = pathEl.getPointAtLength(Math.max(0, Math.min(len, d1)));
            const p2 = pathEl.getPointAtLength(Math.max(0, Math.min(len, d2)));
            
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
            
            const arrow = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            arrow.setAttribute('points', '0,-5 10,0 0,5');
            arrow.setAttribute('fill', '#e94560');
            arrow.setAttribute('opacity', '0.7');
            arrow.setAttribute('transform', `translate(${p1.x},${p1.y}) rotate(${angle})`);
            arrowsGroup.appendChild(arrow);
        }
    }

    function startAnimation() {
        if (state.animFrame) cancelAnimationFrame(state.animFrame);
        state.animProgress = 0;
        
        function animate() {
            if (!state.currentId) return;
            const t = state.tracks[state.currentId];
            const len = pathEl.getTotalLength();
            
            state.animProgress = (state.animProgress + 0.002) % 1;
            const adjustedProgress = (t.startOffset + state.animProgress) % 1;
            const dist = t.reversed 
                ? len * (1 - adjustedProgress)
                : len * adjustedProgress;
            
            const p = pathEl.getPointAtLength(dist);
            carDot.setAttribute('cx', p.x);
            carDot.setAttribute('cy', p.y);
            
            state.animFrame = requestAnimationFrame(animate);
        }
        animate();
    }

    // Wire up controls
    offsetSlider.addEventListener('input', () => {
        if (!state.currentId) return;
        state.tracks[state.currentId].startOffset = parseFloat(offsetSlider.value);
        renderPreview();
    });
    reversedCheck.addEventListener('change', () => {
        if (!state.currentId) return;
        state.tracks[state.currentId].reversed = reversedCheck.checked;
        renderPreview();
    });
    strokeSlider.addEventListener('input', () => {
        if (!state.currentId) return;
        state.tracks[state.currentId].strokeWidth = parseInt(strokeSlider.value);
        renderPreview();
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
        if (!state.currentId) return;
        const btn = document.querySelector(`.track-btn[data-id="${state.currentId}"]`);
        btn.classList.add('done');
    });

    // Export
    document.getElementById('btn-export').addEventListener('click', () => {
        let output = '// Add these properties to each circuit in circuits.js\n\n';
        for (const [id, t] of Object.entries(state.tracks)) {
            if (t.startOffset !== 0 || t.reversed) {
                output += `// ${t.name} (${id})\n`;
                if (t.startOffset !== 0) output += `    startOffset: ${t.startOffset.toFixed(2)},\n`;
                if (t.reversed) output += `    reversed: true,\n`;
                output += '\n';
            }
        }
        
        if (output.split('\n').length <= 3) {
            output += '// No changes needed - all tracks use defaults (offset=0, not reversed)\n';
        }
        
        document.getElementById('export-text').value = output;
        document.getElementById('export-modal').classList.add('active');
    });

    window.copyExport = function() {
        document.getElementById('export-text').select();
        document.execCommand('copy');
    };

    // Select first track
    if (CIRCUITS.length > 0) selectTrack(CIRCUITS[0].id);
</script>
</body>
</html>
